# order-ledger — стек для Proxmox/VPS/облака (CLAUDE.md §6, §12).
# Один и тот же файл переносится без изменений; отличаются только .env и домен/TLS.

services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-orderledger}
      POSTGRES_USER: ${POSTGRES_USER:-orderledger}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-orderledger}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-orderledger}"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-change-me}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-False}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-*}
      BRAND_NAME: ${BRAND_NAME:-Maison}
      POSTGRES_DB: ${POSTGRES_DB:-orderledger}
      POSTGRES_USER: ${POSTGRES_USER:-orderledger}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-orderledger}
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-http://localhost,http://localhost:8080}
      DJANGO_ADMIN_USERNAME: ${DJANGO_ADMIN_USERNAME:-admin}
      DJANGO_ADMIN_PASSWORD: ${DJANGO_ADMIN_PASSWORD:-admin}
    expose:
      - "8000"

  frontend:
    build: ./frontend
    depends_on:
      - web
    volumes:
      - frontend_dist:/usr/share/nginx/html

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - web
      - frontend
    # Слушаем только localhost: наружу сайт отдаёт исключительно Cloudflare Tunnel
    # (cloudflared ходит на 127.0.0.1:8080). Прямой доступ по IP:8080 в обход
    # туннеля закрыт. Для локальной отладки можно временно вернуть 0.0.0.0.
    ports:
      - "127.0.0.1:${HTTP_PORT:-8080}:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - frontend_dist:/usr/share/nginx/html:ro

  # Ночной бэкап БД: pg_dump раз в сутки, хранит последние 14 копий (§12).
  db-backup:
    image: postgres:16
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGHOST: db
      PGUSER: ${POSTGRES_USER:-orderledger}
      PGPASSWORD: ${POSTGRES_PASSWORD:-orderledger}
      PGDATABASE: ${POSTGRES_DB:-orderledger}
    volumes:
      - ./backups:/backups
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "Сервис бэкапа БД запущен (раз в сутки в /backups).";
        while true; do
          TS=$$(date +%Y%m%d_%H%M%S);
          pg_dump -Fc -f /backups/orderledger_$$TS.dump && echo "Бэкап: orderledger_$$TS.dump" || echo "Ошибка бэкапа";
          ls -1t /backups/*.dump 2>/dev/null | tail -n +15 | xargs -r rm -f;
          sleep 86400;
        done

volumes:
  pgdata:
  frontend_dist:
