# nginx: статика фронта (SPA) + проксирование API/Admin на Django (CLAUDE.md §6)
# Резолвим контейнер web через встроенный DNS Docker (127.0.0.11) в рантайме.
# Без этого nginx кэширует IP апстрима навсегда и после пересоздания web отдаёт
# 502 (Connection refused на старый IP). Переменная в proxy_pass + resolver
# заставляют перерезолвить имя (кэш 30с).
resolver 127.0.0.11 valid=30s ipv6=off;

# Реальный протокол клиента приходит от Cloudflare/туннеля в X-Forwarded-Proto.
# nginx слушает http (порт 80) внутри, поэтому $scheme здесь всегда "http" —
# нельзя его форвардить, иначе Django не увидит https. Берём входящий заголовок,
# а при его отсутствии (прямой доступ) считаем https.
map $http_x_forwarded_proto $client_proto {
    default $http_x_forwarded_proto;
    ""      https;
}

server {
    listen 80;
    server_name _;
    client_max_body_size 20m;

    # Адрес апстрима в переменной — обязательно для рантайм-резолвинга (см. resolver выше).
    set $upstream_web http://web:8000;

    # API
    location /api/ {
        proxy_pass $upstream_web;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $client_proto;
    }

    # Django Admin
    location /admin/ {
        proxy_pass $upstream_web;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $client_proto;
    }

    # Статика Django (admin, DRF)
    location /static/ {
        proxy_pass $upstream_web;
        proxy_set_header Host $host;
    }

    # Хэшированные ассеты Vite (имя файла меняется при каждой сборке) —
    # кэшируем навсегда, ревалидация не нужна.
    location /assets/ {
        root /usr/share/nginx/html;
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # Корректный MIME для PWA-манифеста (по умолчанию nginx отдаёт octet-stream).
    location = /manifest.webmanifest {
        root /usr/share/nginx/html;
        default_type application/manifest+json;
        add_header Cache-Control "no-cache";
    }

    # Service worker — всегда ревалидировать, чтобы обновления доезжали.
    location = /sw.js {
        root /usr/share/nginx/html;
        add_header Cache-Control "no-cache";
    }

    # SPA фронтенда: index.html и все маршруты — без кэша (only-if-changed по ETag),
    # чтобы после деплоя сразу подхватывалась новая версия и свежие хэши ассетов.
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }
}
